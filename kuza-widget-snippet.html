<script>
(function(){
  let open = false;
  const fab = document.getElementById('kuza-fab');
  const chat = document.getElementById('kuza-chat');

  window.kuzaToggle = function(){
    open = !open;
    if(open){
      chat.classList.add('kv');
      fab.style.opacity = '0';
      fab.style.pointerEvents = 'none';
      kuzaDismissPopup({stopPropagation:()=>{}});
      setTimeout(()=>document.getElementById('kc-inp').focus(), 350);
    } else {
      chat.classList.remove('kv');
      fab.style.opacity = '1';
      fab.style.pointerEvents = 'all';
    }
  };

  // ... (Keeping your original logic for API, Notifs, etc. here)
  window.kuzaDismissPopup = function(e){e.stopPropagation();document.getElementById('kuza-notif-popup').style.display='none';};
  // (Paste the rest of your original logic here...)
})();
</script>
